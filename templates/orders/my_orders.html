{% extends 'base.html' %}
{% block content %}
<section class="section-content padding-y bg">
<div class="container">
    <h3>My Orders</h3>
    <table class="table">
        <thead>
            <tr>
                <th>Order No.</th>
                <th>Date</th>
                <th>Status</th>
                <th>Total</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order.order_number }}</td>
                <td>{{ order.created_at }}</td>
                <td>{{ order.status }}</td>
                <td>${{ order.order_total }}</td>
                <td><a href="{% url 'order_detail' order.order_number %}" class="btn btn-sm btn-primary">View</a></td>
            </tr>
            {% empty %}
            <tr><td colspan="5">No orders found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</section>
{% endblock content %}
